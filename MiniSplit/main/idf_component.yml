## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=4.1.0'
  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
  # Closure Control/Dimension clusters are excluded from the build in
  # sdkconfig (CONFIG_SUPPORT_CLOSURE_CONTROL_CLUSTER / _DIMENSION_CLUSTER)
  # to work around a bundled connectedhomeip bug -- see
  # WINDOWS_TOOLCHAIN_SETUP.md Troubleshooting and
  # espressif/esp-matter#1604. Present in esp_matter 1.4.2 and 1.5.0 alike,
  # so don't try to dodge it with a version pin.
  espressif/esp_matter: ^1.5
