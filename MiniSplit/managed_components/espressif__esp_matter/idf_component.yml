dependencies:
  espressif/esp_delta_ota:
    require: public
    rules:
    - if: idf_version >=4.3
    version: ^1.1.0
  espressif/esp_encrypted_img:
    require: public
    rules:
    - if: idf_version >=4.4
    version: 2.3.0
  espressif/esp_hosted:
    rules:
    - if: target in [esp32p4]
    version: ~2
  espressif/esp_insights:
    require: public
    rules:
    - if: idf_version >=5.0
    - if: target != esp32h2
    version: ^1.2.4
  espressif/esp_rcp_update:
    rules:
    - if: idf_version >=5.0
    version: ~1.3.0
  espressif/esp_secure_cert_mgr:
    rules:
    - if: idf_version >=4.3
    version: ^2.5.0
  espressif/esp_wifi_remote:
    rules:
    - if: target in [esp32p4]
    version: ^0.7.0
  espressif/json_generator: ~1.1.0
  espressif/json_parser: ~1.0.0
  espressif/mdns:
    rules:
    - if: idf_version >=5.0
    version: ^1.1.0
